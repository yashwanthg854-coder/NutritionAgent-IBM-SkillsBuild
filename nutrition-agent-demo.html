<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nutrition Agent — IBM watsonx Orchestrate Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #05100d; }
  #root { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #22322e; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar } = Recharts;

const QUICK_PROMPTS = [
  "Suggest a diabetic-friendly dinner",
  "Create a 7-day weight-loss plan",
  "Which foods are high in plant protein?",
];

const WEEKLY_CALORIES = [
  { day: "Mon", kcal: 2500 }, { day: "Tue", kcal: 2750 }, { day: "Wed", kcal: 2600 },
  { day: "Thu", kcal: 2900 }, { day: "Fri", kcal: 2400 }, { day: "Sat", kcal: 3000 }, { day: "Sun", kcal: 2640 },
];

const INITIAL_LOG = [
  { id: 1, meal: "Breakfast", desc: "Oats + Banana Smoothie", kcal: 620 },
  { id: 2, meal: "Lunch", desc: "Paneer Tikka + Brown Rice", kcal: 780 },
  { id: 3, meal: "Snack", desc: "Mixed Nuts + Yogurt", kcal: 310 },
  { id: 4, meal: "Dinner", desc: "Tofu Stir-fry + Quinoa", kcal: 730 },
];

const SYSTEM_PROMPT = `You are the Nutrition Agent, an AI-powered dietary guidance system built on IBM watsonx.ai using IBM Granite models, orchestrated via LangFlow inside IBM watsonx Orchestrate.

Your role is to deliver personalized dietary advice, meal planning, and nutritional analysis based on the user's health profile (age, weight, conditions, allergies, goals).

Behave like a Retrieval-Augmented Generation system grounded in USDA FoodData Central and WHO nutrition guidelines: give specific, plausible calorie counts, macro splits (protein/carbs/fats in grams), and concrete meal-by-meal breakdowns. Always end substantive nutrition answers with a line like "Source: USDA FoodData Central | WHO Guidelines".

Keep a supportive, professional, empathetic tone. Keep responses concise and scannable with short headers and bullet points. No markdown code fences.`;

async function callClaude(apiKey, messages) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages,
    }),
  });
  if (!response.ok) {
    const errText = await response.text();
    throw new Error(errText);
  }
  const data = await response.json();
  const text = (data.content || []).map((b) => (b.type === "text" ? b.text : "")).filter(Boolean).join("\n");
  return text || "Sorry, I couldn't generate a response just now.";
}

function ApiKeyBar({ apiKey, setApiKey }) {
  const [show, setShow] = useState(false);
  return (
    <div style={{ background: "#0d1614", borderBottom: "1px solid #1a2724", padding: "8px 16px", display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ fontSize: 11, color: "#7c9691", whiteSpace: "nowrap" }}>Anthropic API Key:</span>
      <input
        type={show ? "text" : "password"}
        value={apiKey}
        onChange={(e) => setApiKey(e.target.value)}
        placeholder="sk-ant-..."
        style={{ flex: 1, background: "#141f1c", border: "1px solid #2a3d39", borderRadius: 6, padding: "5px 10px", fontSize: 12, color: "white", outline: "none" }}
      />
      <button onClick={() => setShow((s) => !s)} style={{ background: "none", border: "none", color: "#5fb8a8", fontSize: 11, cursor: "pointer" }}>
        {show ? "Hide" : "Show"}
      </button>
    </div>
  );
}

function Avatar() {
  return (
    <div style={{ width: 32, height: 32, borderRadius: 8, background: "#00A88F", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16 }}>
      🥗
    </div>
  );
}

function ChatView({ apiKey }) {
  const [messages, setMessages] = useState([
    { role: "assistant", content: "Hello! I'm your personal Nutrition Agent. Tell me your health goals and I'll create a customized meal plan just for you." },
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, loading]);

  const send = async (text) => {
    const content = text !== undefined ? text : input;
    if (!content.trim() || loading) return;
    if (!apiKey) {
      setMessages((cur) => [...cur, { role: "user", content }, { role: "assistant", content: "⚠️ Please enter your Anthropic API key at the top of the page first." }]);
      setInput("");
      return;
    }
    const next = [...messages, { role: "user", content }];
    setMessages(next);
    setInput("");
    setLoading(true);
    try {
      const apiMessages = next.map((m) => ({ role: m.role, content: m.content }));
      const reply = await callClaude(apiKey, apiMessages);
      setMessages((cur) => [...cur, { role: "assistant", content: reply }]);
    } catch (e) {
      setMessages((cur) => [...cur, { role: "assistant", content: "Error reaching the model. Check your API key and try again." }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <div style={{ padding: "16px 24px", borderBottom: "1px solid #1f2b29", background: "#0d1614" }}>
        <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#5fb8a8", fontWeight: 600 }}>
          IBM watsonx Orchestrate › Nutrition Agent
        </div>
        <div style={{ color: "white", fontSize: 18, fontWeight: 600, marginTop: 2 }}>Chat</div>
      </div>

      <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", padding: "20px 24px", display: "flex", flexDirection: "column", gap: 16, background: "#0a1210" }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display: "flex", gap: 12, flexDirection: m.role === "user" ? "row-reverse" : "row" }}>
            {m.role === "assistant" && <Avatar />}
            <div style={{
              maxWidth: "75%", borderRadius: 16, padding: "12px 16px", fontSize: 14, lineHeight: 1.6, whiteSpace: "pre-wrap",
              background: m.role === "user" ? "#0F62FE" : "#141f1c",
              color: m.role === "user" ? "white" : "#dfeae7",
              border: m.role === "user" ? "none" : "1px solid #233330",
              borderTopRightRadius: m.role === "user" ? 4 : 16,
              borderTopLeftRadius: m.role === "assistant" ? 4 : 16,
            }}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", gap: 12 }}>
            <Avatar />
            <div style={{ background: "#141f1c", border: "1px solid #233330", borderRadius: 16, borderTopLeftRadius: 4, padding: "12px 16px", color: "#8fa89f", fontSize: 13 }}>
              Nutrition Agent is thinking…
            </div>
          </div>
        )}
      </div>

      <div style={{ padding: "12px 24px 16px", background: "#0d1614", borderTop: "1px solid #1f2b29" }}>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
          {QUICK_PROMPTS.map((p) => (
            <button key={p} onClick={() => send(p)} disabled={loading} style={{
              fontSize: 12, padding: "6px 12px", borderRadius: 999, border: "1px solid #2a3d39",
              background: "transparent", color: "#a9c4bc", cursor: "pointer", opacity: loading ? 0.4 : 1,
            }}>{p}</button>
          ))}
        </div>
        <form onSubmit={(e) => { e.preventDefault(); send(); }} style={{
          display: "flex", alignItems: "center", gap: 8, background: "#141f1c", border: "1px solid #2a3d39", borderRadius: 999, padding: "6px 6px 6px 16px",
        }}>
          <input value={input} onChange={(e) => setInput(e.target.value)} placeholder="Ask me about nutrition, meal plans, or food data…"
            style={{ flex: 1, background: "transparent", border: "none", outline: "none", fontSize: 14, color: "white" }} />
          <button type="submit" disabled={loading || !input.trim()} style={{
            width: 32, height: 32, borderRadius: "50%", background: "#0F62FE", border: "none", display: "flex", alignItems: "center", justifyContent: "center",
            cursor: "pointer", opacity: (loading || !input.trim()) ? 0.4 : 1, color: "white", fontSize: 14,
          }}>➤</button>
        </form>
      </div>
    </div>
  );
}

function StatCard({ icon, label, value, accent }) {
  return (
    <div style={{ background: "#111c19", border: "1px solid #22322e", borderRadius: 12, padding: "12px 16px", flex: 1, minWidth: 120 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
        <span style={{ color: accent, fontSize: 13 }}>{icon}</span>
        <span style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, color: "#7c9691" }}>{label}</span>
      </div>
      <div style={{ fontSize: 20, fontWeight: 600, color: "white" }}>{value}</div>
    </div>
  );
}

function DashboardView() {
  const [log, setLog] = useState(INITIAL_LOG);
  const [showForm, setShowForm] = useState(false);
  const [mealName, setMealName] = useState("");
  const [mealDesc, setMealDesc] = useState("");
  const [mealKcal, setMealKcal] = useState("");

  const totalKcal = log.reduce((s, m) => s + m.kcal, 0);
  const target = 3000;
  const remaining = target - totalKcal;

  const addMeal = (e) => {
    e.preventDefault();
    if (!mealDesc.trim() || !mealKcal) return;
    setLog((cur) => [...cur, { id: Date.now(), meal: mealName || "Extra", desc: mealDesc, kcal: Number(mealKcal) }]);
    setMealName(""); setMealDesc(""); setMealKcal(""); setShowForm(false);
  };

  return (
    <div style={{ height: "100%", overflowY: "auto", background: "#0a1210", padding: "20px 24px" }}>
      <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#5fb8a8", fontWeight: 600, marginBottom: 2 }}>
        IBM watsonx Orchestrate › Food Log &amp; Nutritional Dashboard
      </div>
      <h2 style={{ color: "white", fontSize: 18, fontWeight: 600, marginBottom: 16 }}>Today's Overview</h2>

      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
        <StatCard icon="🔥" label="Calories Today" value={totalKcal.toLocaleString()} accent="#ff8a5c" />
        <StatCard icon="🥩" label="Protein" value="142g" accent="#5fb8a8" />
        <StatCard icon="🌾" label="Carbohydrates" value="310g" accent="#f0c65f" />
        <StatCard icon="💧" label="Fats" value="88g" accent="#7ea8ff" />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
        <div style={{ background: "#111c19", border: "1px solid #22322e", borderRadius: 12, padding: 16 }}>
          <div style={{ fontSize: 13, color: "#a9c4bc", marginBottom: 8, fontWeight: 500 }}>Weekly Caloric Intake</div>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={WEEKLY_CALORIES}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1e2c29" vertical={false} />
              <XAxis dataKey="day" stroke="#5f7871" fontSize={11} tickLine={false} axisLine={false} />
              <YAxis stroke="#5f7871" fontSize={11} tickLine={false} axisLine={false} />
              <Tooltip contentStyle={{ background: "#141f1c", border: "1px solid #2a3d39", borderRadius: 8, fontSize: 12 }} labelStyle={{ color: "#dfeae7" }} />
              <Bar dataKey="kcal" fill="#00A88F" radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>

        <div style={{ background: "#111c19", border: "1px solid #22322e", borderRadius: 12, padding: 16, display: "flex", flexDirection: "column" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 13, color: "#a9c4bc", fontWeight: 500 }}>Today's Meal Log</div>
            <button onClick={() => setShowForm((v) => !v)} style={{
              display: "flex", alignItems: "center", gap: 4, fontSize: 12, padding: "5px 10px", borderRadius: 999,
              background: "#00A88F", color: "#04211c", fontWeight: 600, border: "none", cursor: "pointer",
            }}>+ Log Meal</button>
          </div>

          {showForm && (
            <form onSubmit={addMeal} style={{ marginBottom: 12, background: "#0d1614", border: "1px solid #22322e", borderRadius: 8, padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
              <input value={mealName} onChange={(e) => setMealName(e.target.value)} placeholder="Meal type (e.g. Snack)"
                style={{ background: "#141f1c", border: "1px solid #2a3d39", borderRadius: 6, padding: "6px 10px", fontSize: 12, color: "white", outline: "none" }} />
              <input value={mealDesc} onChange={(e) => setMealDesc(e.target.value)} placeholder="Description"
                style={{ background: "#141f1c", border: "1px solid #2a3d39", borderRadius: 6, padding: "6px 10px", fontSize: 12, color: "white", outline: "none" }} />
              <input value={mealKcal} onChange={(e) => setMealKcal(e.target.value)} type="number" placeholder="Calories"
                style={{ background: "#141f1c", border: "1px solid #2a3d39", borderRadius: 6, padding: "6px 10px", fontSize: 12, color: "white", outline: "none" }} />
              <button type="submit" style={{ background: "#0F62FE", color: "white", fontSize: 12, fontWeight: 600, padding: "6px 0", borderRadius: 6, border: "none", cursor: "pointer" }}>
                Save Entry
              </button>
            </form>
          )}

          <div style={{ flex: 1, overflowY: "auto", maxHeight: 220 }}>
            {log.map((m) => (
              <div key={m.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #1e2c29", padding: "8px 0", fontSize: 13 }}>
                <div>
                  <div style={{ color: "#dfeae7" }}>{m.meal}</div>
                  <div style={{ color: "#7c9691", fontSize: 11 }}>{m.desc}</div>
                </div>
                <div style={{ color: "#5fb8a8", fontWeight: 500 }}>{m.kcal} kcal</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{ background: "#0d211c", border: "1px solid #1e4a3d", borderRadius: 12, padding: 16 }}>
        <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5, color: "#5fb8a8", fontWeight: 600, marginBottom: 4 }}>
          AI Nutritional Suggestion
        </div>
        <p style={{ fontSize: 14, color: "#dfeae7", lineHeight: 1.6, margin: 0 }}>
          {remaining > 0
            ? `You're ${remaining} kcal below your daily target of ${target}. Consider adding a protein-rich evening snack like cottage cheese (200 kcal) + almonds (160 kcal).`
            : `You've reached your ${target} kcal target for today. Great consistency — focus on hydration and a lighter dinner.`}
          {" "}Vitamin D intake is low — include fortified milk or sunlight exposure.
        </p>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("chat");
  const [apiKey, setApiKey] = useState("");

  return (
    <div style={{ width: "100%", maxWidth: 1100, height: "80vh", minHeight: 560, display: "flex", flexDirection: "column", borderRadius: 16, overflow: "hidden", border: "1px solid #1a2724", boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }}>
      <ApiKeyBar apiKey={apiKey} setApiKey={setApiKey} />
      <div style={{ flex: 1, display: "flex", minHeight: 0, background: "#0a1210" }}>
        <div style={{ width: 220, background: "#0d1614", borderRight: "1px solid #1a2724", display: "flex", flexDirection: "column", padding: "16px 0", flexShrink: 0 }}>
          <div style={{ padding: "0 16px", marginBottom: 24 }}>
            <div style={{ color: "white", fontWeight: 700, fontSize: 14, lineHeight: 1.3 }}>IBM watsonx</div>
            <div style={{ color: "#00A88F", fontWeight: 700, fontSize: 14, lineHeight: 1.3 }}>Orchestrate</div>
            <div style={{ fontSize: 10, color: "#5f7871", marginTop: 4 }}>Nutrition Agent Demo</div>
          </div>
          <nav style={{ display: "flex", flexDirection: "column", gap: 4, padding: "0 8px" }}>
            <button onClick={() => setTab("chat")} style={{
              display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 8, fontSize: 14, cursor: "pointer", border: "none", textAlign: "left",
              background: tab === "chat" ? "rgba(0,168,143,0.1)" : "transparent",
              color: tab === "chat" ? "white" : "#8fa89f",
              borderLeft: tab === "chat" ? "1px solid #00A88F66" : "1px solid transparent",
            }}>💬 Chat</button>
            <button onClick={() => setTab("dashboard")} style={{
              display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 8, fontSize: 14, cursor: "pointer", border: "none", textAlign: "left",
              background: tab === "dashboard" ? "rgba(0,168,143,0.1)" : "transparent",
              color: tab === "dashboard" ? "white" : "#8fa89f",
            }}>📊 Dashboard</button>
          </nav>
          <div style={{ marginTop: "auto", padding: "16px", borderTop: "1px solid #1a2724", margin: "16px 8px 0" }}>
            <div style={{ fontSize: 10, color: "#5f7871", lineHeight: 1.6 }}>
              Deployed on IBM Cloud Lite<br />IBM SkillsBuild × AICTE-2026
            </div>
          </div>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          {tab === "chat" ? <ChatView apiKey={apiKey} /> : <DashboardView />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
